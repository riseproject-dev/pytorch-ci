name: CI

on:
  workflow_dispatch:
    inputs:
      ref:
        description: The git ref to trigger the workflow on
        required: true
        type: string
      sha:
        description: |
          The git sha to trigger the workflow on; it falls back to the ref
        required: false
        type: string

run-name: CI - ${{ inputs.ref }}

permissions:
  contents: read
  packages: read

env:
  # FIXME: switch to ghcr.io to pull ghcr.io/pytorch/ci-image once https://github.com/pytorch/pytorch/pull/182278 has been merged
  DOCKER_REGISTRY: ghcr.io/riseproject-dev
  BUILD_ENVIRONMENT: pytorch-linux-noble-riscv64-py3.12-gcc14

jobs:
  linux-noble-riscv64-py3_12-build:
    name: linux-noble-riscv64-py3.12
    runs-on: ubuntu-24.04-riscv
    timeout-minutes: 1440 # 24h
    concurrency:
      group: ${{ github.workflow_ref }}-${{ github.workflow_sha }}-${{ inputs.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout PyTorch Repository at ${{ inputs.ref }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: pytorch/pytorch
          ref: ${{ inputs.sha || inputs.ref }}
          submodules: recursive
          path: pytorch

      - name: Apply PyTorch patch
        working-directory: ${{ github.workspace }}/pytorch
        run: |
          git apply -3 ../pytorch-build-sh.patch
          git config --global user.email "you@example.com"
          git config --global user.name "Your Name"
          git commit -m "{patch} Fix .ci/pytorch/build.sh for native builds on riscv64"

      - name: Pull Container Image
        working-directory: ${{ github.workspace }}/pytorch
        run: |
          set +e
          set -x

          # FIXME: once https://github.com/pytorch/pytorch/pull/182278 is merged, we can use
          # the `git rev-parse HEAD:.ci/docker` suffix since the image would be built upstream
          # DOCKER_IMAGE="${{ env.DOCKER_REGISTRY }}/pytorch/ci-image:${{ env.BUILD_ENVIRONMENT }}-$(git rev-parse HEAD:.ci/docker)"
          DOCKER_IMAGE="${{ env.DOCKER_REGISTRY }}/pytorch/ci-image:${{ env.BUILD_ENVIRONMENT }}"

          START_TIME=$(date +%s)
          # Wait up to 180 minutes
          while [[ $(( $(date +%s) - 10800 )) -lt $START_TIME ]]; do
            # Check if image already exists, if it does then pull it and exit
            if docker manifest inspect "${DOCKER_IMAGE}"; then
              docker pull "${DOCKER_IMAGE}"
              echo "DOCKER_IMAGE=${DOCKER_IMAGE}" >> $GITHUB_ENV
              exit 0
            fi

            sleep 300
          done

          echo "::error:: Failed to pull the build container image in 180 minutes; did it failed to build?"
          exit 1

      - name: Build
        id: build
        env:
          BRANCH: ${{ inputs.ref }}
          SHA1: ${{ inputs.sha }}
          # Do not set SCCACHE_S3_KEY_PREFIX to share the cache between all build jobs
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCCACHE_BUCKET: rise-pytorch-ci-cache
          SCCACHE_REGION: fr-par
          SCCACHE_ENDPOINT: https://s3.fr-par.scw.cloud
          SCCACHE_COORDINATOR_REDIS_ENDPOINT: tcp://62.210.239.26:6379
          SCCACHE_COORDINATOR_REDIS_USERNAME: rise-pytorch-ci-cache
          SCCACHE_COORDINATOR_REDIS_PASSWORD: ${{ secrets.COORDINATOR_REDIS_PASSWORD }}
          USE_NINJA: 0 # it doesn't interact well with the coordinator jobserver
        working-directory: ${{ github.workspace }}/pytorch
        run: |
          set -x
          START_TIME=$(date +%s)

          # Leaving 1GB for the runner and other things
          TOTAL_AVAILABLE_MEMORY_IN_GB=$(awk '/MemTotal/ { printf "%.3f \n", $2/1024/1024 - 1 }' /proc/meminfo)
          # https://docs.docker.com/engine/containers/resource_constraints/#--memory-swap-details, the 3GB swap
          # comes from https://github.com/pytorch/test-infra/pull/6058
          TOTAL_MEMORY_WITH_SWAP=$(("${TOTAL_AVAILABLE_MEMORY_IN_GB%.*}" + 3))

          # shellcheck disable=SC2086
          docker run \
            -e BUILD_ENVIRONMENT="${BUILD_ENVIRONMENT}" \
            -e PR_NUMBER="${PR_NUMBER}" \
            -e SHA1="${SHA1}" \
            -e BRANCH="${BRANCH}" \
            -e AWS_ACCESS_KEY_ID \
            -e AWS_SECRET_ACCESS_KEY \
            -e SCCACHE_BUCKET="${SCCACHE_BUCKET}" \
            -e SCCACHE_REGION="${SCCACHE_REGION}" \
            -e SCCACHE_ENDPOINT="${SCCACHE_ENDPOINT}" \
            -e SCCACHE_COORDINATOR_REDIS_ENDPOINT="${SCCACHE_COORDINATOR_REDIS_ENDPOINT}" \
            -e SCCACHE_COORDINATOR_REDIS_USERNAME="${SCCACHE_COORDINATOR_REDIS_USERNAME}" \
            -e SCCACHE_COORDINATOR_REDIS_PASSWORD \
            -e USE_NINJA=${USE_NINJA} \
            -e XLA_CUDA="${XLA_CUDA}" \
            -e XLA_CLANG_CACHE_S3_BUCKET_NAME="${XLA_CLANG_CACHE_S3_BUCKET_NAME}" \
            -e SKIP_SCCACHE_INITIALIZATION=1 \
            -e TORCH_CUDA_ARCH_LIST="${TORCH_CUDA_ARCH_LIST}" \
            -e PR_LABELS="${PR_LABELS}" \
            -e OUR_GITHUB_JOB_ID="${OUR_GITHUB_JOB_ID}" \
            -e HUGGING_FACE_HUB_TOKEN="${HUGGING_FACE_HUB_TOKEN}" \
            -e BUILD_ADDITIONAL_PACKAGES="${BUILD_ADDITIONAL_PACKAGES}" \
            -e RUNNER="${RUNNER}" \
            -e ACTIONS_RESULTS_URL="${ACTIONS_RESULTS_URL}" \
            -e ACTIONS_RUNTIME_TOKEN="${ACTIONS_RUNTIME_TOKEN}" \
            -e ACTIONS_CACHE_SERVICE_V2="${ACTIONS_CACHE_SERVICE_V2}" \
            --memory="${TOTAL_AVAILABLE_MEMORY_IN_GB%.*}g" \
            --memory-swap="${TOTAL_MEMORY_WITH_SWAP}g" \
            --security-opt seccomp=unconfined \
            --cap-add=SYS_PTRACE \
            --tty \
            --detach \
            --user jenkins \
            --name pytorch-ci-build \
            -v "$(pwd -P):/var/lib/jenkins/workspace" \
            -w /var/lib/jenkins/workspace \
            "${DOCKER_IMAGE}"

          #####################################################################
          # Install dependencies necessary for sccache build coordinator
          docker exec -i pytorch-ci-build bash --norc --noprofile -eux -o pipefail <<'EOF'
          # download sccache with coordinator support
          curl -fsSL https://github.com/luhenry/sccache/releases/download/v0.15.0-coordinator-redis/sccache-v0.15.0-coordinator-redis-riscv64gc-unknown-linux-musl.tar.gz | \
            sudo tar -xvzf - -C /opt/cache/bin --strip-components 1 --wildcards sccache-*-riscv64gc-unknown-linux-musl/sccache
          # download make v4.4, required for jobserver w/ fifo support
          curl -fsSL http://ftp.fr.debian.org/debian/pool/main/m/make-dfsg/make_4.4.1-2_riscv64.deb -o /tmp/make_4.4.1-2_riscv64.deb
          sudo dpkg -i /tmp/make_4.4.1-2_riscv64.deb
          EOF

          #####################################################################
          # Verify sccache + coordinator wiring before the real build. We want to
          # catch (a) sccache binary missing the coordinator feature, (b) the
          # SCCACHE_COORDINATOR_REDIS_* env vars not landing inside the
          # container, and (c) the runner being unable to reach the redis host.
          # The sccache server is left running so build.sh's first sccache
          # invocation reuses it.
          docker exec -i \
            -e SCCACHE_LOG=sccache=debug,sccache::coordinator=trace,sccache::server=info \
            -e SCCACHE_ERROR_LOG=/tmp/sccache.log \
            pytorch-ci-build bash --norc --noprofile -eux -o pipefail <<'EOF'
          echo "::group::sccache version + relevant env"
          /opt/cache/bin/sccache --version
          env | grep -E '^SCCACHE_|^AWS_' | sort
          echo "::endgroup::"

          echo "::group::TCP reachability to redis coordinator"
          if timeout 5 bash -c "</dev/tcp/62.210.239.26/6379" 2>/dev/null; then
            echo "redis: TCP reachable from runner"
          else
            echo "::error::redis: TCP NOT reachable from runner ($?). Coordinator will silently no-op."
          fi
          echo "::endgroup::"

          echo "::group::start sccache server (with coordinator trace logging)"
          /opt/cache/bin/sccache --start-server
          # Server backgrounds itself; give it a moment to log config + connect to redis.
          sleep 2
          /opt/cache/bin/sccache --show-stats
          echo "::endgroup::"

          echo "::group::sccache server log (post-startup)"
          if [[ -s /tmp/sccache.log ]]; then
            cat /tmp/sccache.log
            if grep -qE 'coordinator|RedisCoordinator|redis_lease' /tmp/sccache.log; then
              echo "coordinator: engaged (matched coordinator/redis traces in startup log)"
            else
              echo "::warning::sccache startup log mentions no coordinator/redis activity \u2014 the coordinator may be silently disabled"
            fi
          else
            echo "::warning::/tmp/sccache.log is empty \u2014 SCCACHE_LOG may not have taken effect"
          fi
          echo "::endgroup::"
          EOF

          #####################################################################
          # Build pytorch
          docker exec -t pytorch-ci-build sh -c '.ci/pytorch/build.sh'

          END_TIME=$(date +%s)
          echo "build_time=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Store PyTorch Build Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: steps.build.outcome != 'skipped'
        with:
          name: ${{ env.BUILD_ENVIRONMENT }}
          retention-days: 14
          if-no-files-found: error
          path: |
            dist/
            build/custom_test_artifacts
            build/lib
            build/bin
            .additional_ci_files
